<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>
<style>
  :root{
    --bg:#0a0c10; --panel:#12161d; --panel-2:#161b24; --line:#222a36;
    --txt:#e6edf3; --muted:#8b97a7; --dim:#5a6675;
    --accent:#4f8cff; --green:#3fb950; --amber:#d29922; --red:#f85149; --purple:#a371f7;
    --radius:14px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);min-height:100vh;padding:28px 32px 60px;
    background-image:radial-gradient(900px 500px at 80% -10%,rgba(79,140,255,.08),transparent),
      radial-gradient(700px 500px at 0% 0%,rgba(163,113,247,.06),transparent);}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:6px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:12px}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(63,185,80,.6);animation:p 2.4s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 9px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}
  .clock{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  .sub{color:var(--dim);font-size:13px;margin-bottom:24px}

  /* roll-up KPIs */
  .rollup{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .kpi{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:var(--radius);padding:16px 18px}
  .kpi .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:26px;font-weight:700;margin-top:8px;letter-spacing:-.5px}
  .kpi .delta{font-size:12px;margin-top:4px;color:var(--dim)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .biz{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;min-height:420px}
  .biz .head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .dot{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
  .biz h2{font-size:16px;font-weight:650;letter-spacing:-.2px}
  .biz .tag{font-size:11px;color:var(--muted)}
  .statusbadge{margin-left:auto;font-size:11px;padding:4px 9px;border-radius:20px;font-weight:600}
  .s-ok{background:rgba(63,185,80,.14);color:var(--green)}
  .s-warn{background:rgba(210,153,34,.14);color:var(--amber)}
  .s-crit{background:rgba(248,81,73,.14);color:var(--red)}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
  .metric{background:var(--panel-2);padding:13px 16px;cursor:pointer;transition:background .15s}
  .metric:hover{background:#1b212c}
  .metric .m-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .metric .m-val{font-size:19px;font-weight:700;margin-top:4px}

  .section{padding:14px 18px;border-top:1px solid var(--line)}
  .section h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .add{cursor:pointer;color:var(--accent);font-size:16px;line-height:1;user-select:none}
  .add:hover{color:#7aa9ff}
  ul{list-style:none}
  .task{display:flex;align-items:flex-start;gap:9px;padding:6px 0;font-size:13.5px;color:var(--txt);line-height:1.4}
  .task .box{width:15px;height:15px;border:1.6px solid var(--dim);border-radius:4px;margin-top:1px;flex-shrink:0;cursor:pointer;transition:.15s}
  .task.done .box{background:var(--green);border-color:var(--green)}
  .task.done .txt{text-decoration:line-through;color:var(--dim)}
  .task .txt{flex:1;cursor:text}
  .task .pri{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0}
  .p-hi{background:var(--red)} .p-md{background:var(--amber)} .p-lo{background:var(--dim)}
  .task .del{color:var(--dim);cursor:pointer;opacity:0;font-size:14px}
  .task:hover .del{opacity:1}
  .task .del:hover{color:var(--red)}
  .empty{color:var(--dim);font-size:12.5px;font-style:italic;padding:4px 0}

  .alerts .task .txt{color:var(--amber)}
  .grow{flex:1}
  .foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim)}
  .note{background:transparent;border:none;color:var(--muted);font-size:13px;width:100%;resize:vertical;min-height:38px;font-family:inherit;outline:none;line-height:1.5}
  .note::placeholder{color:var(--dim)}

  .bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:9px;
    font-size:12.5px;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{border-color:var(--accent);color:var(--txt)}

  /* github projects */
  .projwrap{margin-top:30px}
  .projwrap > h2{font-size:15px;font-weight:650;letter-spacing:-.2px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .gh-ico{width:18px;height:18px;fill:var(--muted)}
  .projwrap .meta{color:var(--dim);font-size:12px;margin-bottom:14px}
  .projgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .proj{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;transition:.15s}
  .proj:hover{border-color:#2f3a4a}
  .proj .ptop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .proj a.pname{font-size:15px;font-weight:650;color:var(--txt);text-decoration:none}
  .proj a.pname:hover{color:var(--accent)}
  .vis{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .v-pub{background:rgba(63,185,80,.13);color:var(--green)}
  .v-priv{background:rgba(139,151,167,.14);color:var(--muted)}
  .lang{margin-left:auto;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .lang .ld{width:9px;height:9px;border-radius:50%}
  .commit{font-size:13px;color:var(--muted);line-height:1.4;border-left:2px solid var(--line);padding-left:10px;margin-bottom:12px}
  .commit b{color:var(--txt);font-weight:550}
  .commit .when{color:var(--dim);font-size:11.5px;display:block;margin-top:3px}
  .spark{display:flex;align-items:flex-end;gap:3px;height:42px;margin:0 0 12px 0}
  .spark .b{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;opacity:.55;transition:.15s}
  .spark .b:hover{opacity:1}
  .spark .b.recent{opacity:.95}
  .sparklbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between}
  .pstats{display:flex;gap:18px;font-size:12px;color:var(--muted)}
  .pstats .n{color:var(--txt);font-weight:650}
  .pstats .live{color:var(--green)}
  .biztag{font-size:11px;color:var(--dim);margin-left:6px}
  @media(max-width:1000px){.grid{grid-template-columns:1fr}.rollup{grid-template-columns:1fr 1fr}.projgrid{grid-template-columns:1fr}}
  /* edit modal */
  .edit{font-size:13px;background:var(--panel);border:1px solid var(--accent);color:var(--txt);
    padding:2px 6px;border-radius:5px;width:90%;font-family:inherit;outline:none}
</style>
</head>
<body>
  <div class="top">
    <h1><span class="pulse"></span>Command Center</h1>
    <div class="clock" id="clock"></div>
  </div>
  <div class="sub" id="sub">Monitoring 3 businesses · click any number, task, or note to edit · everything saves to this browser</div>

  <div class="rollup" id="rollup"></div>

  <div class="bar">
    <button class="btn" onclick="addTaskTo('barro')">+ Barro task</button>
    <button class="btn" onclick="addTaskTo('raven')">+ Ravenmails task</button>
    <button class="btn" onclick="addTaskTo('eclo')">+ Eclo task</button>
    <button class="btn" onclick="exportData()">⤓ Export backup</button>
    <button class="btn" onclick="importData()">⤒ Import backup</button>
    <button class="btn" onclick="resetData()">↺ Reset to defaults</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="projwrap">
    <h2><svg class="gh-ico" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub Projects <span class="biztag" id="projcount"></span></h2>
    <div class="meta" id="projmeta"></div>
    <div class="projgrid" id="projgrid"></div>
  </div>

<!-- GitHub snapshot data — regenerated daily by .github/workflows/refresh-snapshot.yml -->
<script src="data.js"></script>
<script>
// Fallback if data.js is missing/blocked (e.g. opened straight from disk in some browsers)
window.SNAPSHOT_AT = window.SNAPSHOT_AT || "2026-07-01T00:00:00Z";
window.REPOS = window.REPOS || [];
function ago(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return "just now"; const m=Math.floor(s/60); if(m<60)return m+"m ago";
  const h=Math.floor(m/60); if(h<24)return h+"h ago"; const d=Math.floor(h/24);
  if(d<30)return d+"d ago"; const mo=Math.floor(d/30); if(mo<12)return mo+"mo ago"; return Math.floor(mo/12)+"y ago";
}
function renderProjects(){
  document.getElementById("projcount").textContent = REPOS.length+" repos · barroindustries";
  document.getElementById("projmeta").textContent =
    "Snapshot from "+new Date(SNAPSHOT_AT).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})+
    " · click a name to open it on GitHub · 100+ = capped at 100";
  document.getElementById("projgrid").innerHTML = REPOS.map(r=>{
    const cap = r.commits30d>=100 ? "100+" : r.commits30d;
    const wk = r.weekly||[];
    const mx = Math.max(1,...wk);
    const bars = wk.map((v,j)=>`<div class="b ${j>=wk.length-4?'recent':''}" style="height:${Math.round((v/mx)*100)}%" title="${v} commits, week ${wk.length-j} ago"></div>`).join("");
    const chart = wk.length ? `
      <div class="sparklbl"><span>Commits / week (12 wk)</span><span>peak ${mx}</span></div>
      <div class="spark">${bars}</div>` : "";
    return `<div class="proj">
      <div class="ptop">
        <a class="pname" href="${r.url}" target="_blank" rel="noopener">${esc(r.name)}</a>
        <span class="vis ${r.private?'v-priv':'v-pub'}">${r.private?'private':'public'}</span>
        <span class="lang"><span class="ld" style="background:${r.langColor}"></span>${esc(r.lang)}</span>
      </div>
      <div class="biztag" style="margin:0 0 10px 0">▹ ${esc(r.biz)}</div>
      <div class="commit"><b>${esc(r.lastMsg)}</b><span class="when">${esc(r.lastBy)} · ${ago(r.lastAt)}</span></div>
      ${chart}
      <div class="pstats">
        <span><span class="n">${cap}</span> commits / 30d</span>
        <span><span class="n">${r.totalCommits||'—'}</span> total</span>
        <span><span class="n">${r.openIssues}</span> issues</span>
        <span class="live">● tracked</span>
      </div>
    </div>`;
  }).join("");
}

const DEFAULTS = {
  barro: {
    name:"Barro Industries", tag:"Manufacturing · gas ranges & steel", initials:"BI", color:"#4f8cff",
    metrics:[
      {lbl:"MTD Revenue", val:"₱0"},
      {lbl:"Open Quotes", val:"0"},
      {lbl:"Production", val:"On track"},
      {lbl:"Receivables", val:"₱0"},
    ],
    tasks:[
      {t:"Review pending quotations", done:false, pri:"hi"},
      {t:"Check production schedule for the week", done:false, pri:"md"},
    ],
    alerts:[{t:"No critical alerts", done:false, pri:"lo"}],
    note:""
  },
  raven: {
    name:"Ravenmails", tag:"Email / SaaS", initials:"RM", color:"#a371f7",
    metrics:[
      {lbl:"MRR", val:"$0"},
      {lbl:"Active Users", val:"0"},
      {lbl:"Churn", val:"0%"},
      {lbl:"Uptime", val:"100%"},
    ],
    tasks:[
      {t:"Review weekly signups", done:false, pri:"md"},
      {t:"Check deliverability rates", done:false, pri:"hi"},
    ],
    alerts:[{t:"All systems operational", done:false, pri:"lo"}],
    note:""
  },
  eclo: {
    name:"Eclo", tag:"Brand / venture", initials:"EC", color:"#3fb950",
    metrics:[
      {lbl:"Revenue", val:"$0"},
      {lbl:"Orders", val:"0"},
      {lbl:"Pipeline", val:"$0"},
      {lbl:"Status", val:"Active"},
    ],
    tasks:[
      {t:"Define this month's priorities", done:false, pri:"hi"},
    ],
    alerts:[{t:"No critical alerts", done:false, pri:"lo"}],
    note:""
  }
};
const ORDER = ["barro","raven","eclo"];
const KEY = "commandCenter.v1";

let data = load();
function load(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  return structuredClone(DEFAULTS);
}
function save(){ localStorage.setItem(KEY, JSON.stringify(data)); render(); }

function statusOf(b){
  const crit = b.alerts.some(a=>!a.done && a.pri==="hi");
  const warn = b.alerts.some(a=>!a.done && a.pri==="md") || b.tasks.some(t=>!t.done && t.pri==="hi");
  if(crit) return ["CRITICAL","s-crit"];
  if(warn) return ["ATTENTION","s-warn"];
  return ["HEALTHY","s-ok"];
}

function render(){
  // rollup
  let openTasks=0, openAlerts=0, healthy=0;
  ORDER.forEach(k=>{
    const b=data[k];
    openTasks += b.tasks.filter(t=>!t.done).length;
    openAlerts += b.alerts.filter(a=>!a.done && a.pri!=="lo").length;
    if(statusOf(b)[1]==="s-ok") healthy++;
  });
  document.getElementById("rollup").innerHTML = `
    ${kpi("Businesses", ORDER.length, "monitored live")}
    ${kpi("Healthy", healthy+"/"+ORDER.length, healthy===ORDER.length?"all green":"needs attention")}
    ${kpi("Open Tasks", openTasks, "across all units")}
    ${kpi("Active Alerts", openAlerts, openAlerts? "review now":"nothing flagged")}
  `;

  // business cards
  document.getElementById("grid").innerHTML = ORDER.map(k=>card(k,data[k])).join("");
}
function kpi(lbl,val,delta){
  return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="delta">${delta}</div></div>`;
}
function card(key,b){
  const [stxt,scls]=statusOf(b);
  const m = b.metrics.map((x,i)=>`
    <div class="metric" onclick="editMetric('${key}',${i})">
      <div class="m-lbl">${esc(x.lbl)}</div><div class="m-val">${esc(x.val)}</div>
    </div>`).join("");
  return `
  <div class="biz">
    <div class="head">
      <div class="dot" style="background:${b.color}">${b.initials}</div>
      <div><h2>${esc(b.name)}</h2><div class="tag">${esc(b.tag)}</div></div>
      <span class="statusbadge ${scls}">${stxt}</span>
    </div>
    <div class="metrics">${m}</div>
    <div class="section alerts">
      <h3>Alerts <span class="add" onclick="addAlert('${key}')">+</span></h3>
      <ul>${list(key,b.alerts,'alerts')}</ul>
    </div>
    <div class="section grow">
      <h3>Tasks <span class="add" onclick="addTaskTo('${key}')">+</span></h3>
      <ul>${list(key,b.tasks,'tasks')}</ul>
    </div>
    <div class="foot">
      <textarea class="note" placeholder="Notes…" onchange="setNote('${key}',this.value)">${esc(b.note||"")}</textarea>
    </div>
  </div>`;
}
function list(key,arr,kind){
  if(!arr.length) return `<li class="empty">Nothing here — click + to add.</li>`;
  return arr.map((it,i)=>`
    <li class="task ${it.done?'done':''}">
      <span class="box" onclick="toggle('${key}','${kind}',${i})"></span>
      <span class="pri p-${it.pri||'lo'}" onclick="cyclePri('${key}','${kind}',${i})" title="priority"></span>
      <span class="txt" onclick="editTask('${key}','${kind}',${i},this)">${esc(it.t)}</span>
      <span class="del" onclick="delTask('${key}','${kind}',${i})">×</span>
    </li>`).join("");
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// actions
function toggle(k,kind,i){ data[k][kind][i].done=!data[k][kind][i].done; save(); }
function cyclePri(k,kind,i){ const o=['lo','md','hi']; const c=data[k][kind][i].pri||'lo'; data[k][kind][i].pri=o[(o.indexOf(c)+1)%3]; save(); }
function delTask(k,kind,i){ data[k][kind].splice(i,1); save(); }
function addTaskTo(k){ const t=prompt("New task for "+data[k].name+":"); if(t){ data[k].tasks.push({t,done:false,pri:'md'}); save(); } }
function addAlert(k){ const t=prompt("New alert for "+data[k].name+":"); if(t){ data[k].alerts.unshift({t,done:false,pri:'hi'}); save(); } }
function setNote(k,v){ data[k].note=v; localStorage.setItem(KEY, JSON.stringify(data)); }
function editTask(k,kind,i,el){
  const cur=data[k][kind][i].t;
  el.innerHTML=`<input class="edit" value="${esc(cur)}">`;
  const inp=el.querySelector("input"); inp.focus(); inp.select();
  const fin=()=>{ const v=inp.value.trim(); if(v) data[k][kind][i].t=v; save(); };
  inp.addEventListener("blur",fin);
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();fin();} if(e.key==="Escape"){render();} });
}
function editMetric(k,i){
  const m=data[k].metrics[i];
  const v=prompt("Update “"+m.lbl+"”:", m.val);
  if(v!==null){ m.val=v; save(); }
}

// data mgmt
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="command-center-backup.json"; a.click();
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange=e=>{ const f=e.target.files[0]; const r=new FileReader();
    r.onload=()=>{ try{ data=JSON.parse(r.result); save(); }catch(err){ alert("Invalid file"); } }; r.readAsText(f); };
  inp.click();
}
function resetData(){ if(confirm("Reset all data to defaults? This clears your edits.")){ data=structuredClone(DEFAULTS); save(); } }

// clock
function tick(){
  const d=new Date();
  document.getElementById("clock").textContent =
    d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+" · "+
    d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000); tick();
render();
renderProjects();
</script>
</body>
</html>
