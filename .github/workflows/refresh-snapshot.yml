name: Refresh GitHub snapshot

on:
  schedule:
    - cron: "0 21 * * *"   # daily at 21:00 UTC (~05:00 Manila)
  workflow_dispatch: {}      # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/build-snapshot.sh
          ./scripts/build-snapshot.sh

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.js; then
            git add data.js
            git commit -m "chore: refresh GitHub snapshot ($(date -u +%Y-%m-%d))"
            git push
            echo "Snapshot updated."
          else
            echo "No changes."
          fi
